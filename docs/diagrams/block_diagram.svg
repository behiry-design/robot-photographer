<svg width="900" height="760" viewBox="0 0 900 760" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<marker id="arrow2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#7F77DD" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>
<rect width="900" height="760" fill="#ffffff"/>

<!-- TITLE -->
<text x="450" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#222">System Block Diagram — Microcontroller / Raspberry Pi</text>

<!-- SENSORS column -->
<text x="90" y="56" text-anchor="middle" font-size="12" fill="#555">Sensors</text>

<rect x="20" y="65" width="140" height="50" rx="8" fill="#F1EFE8" stroke="#888" stroke-width="0.8"/>
<text x="90" y="85" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Ultrasonic L</text>
<text x="90" y="103" text-anchor="middle" font-size="10" fill="#666">HC-SR04, Trig/Echo</text>

<rect x="20" y="130" width="140" height="50" rx="8" fill="#F1EFE8" stroke="#888" stroke-width="0.8"/>
<text x="90" y="150" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Ultrasonic R</text>
<text x="90" y="168" text-anchor="middle" font-size="10" fill="#666">HC-SR04, Trig/Echo</text>

<rect x="20" y="195" width="140" height="50" rx="8" fill="#F1EFE8" stroke="#888" stroke-width="0.8"/>
<text x="90" y="215" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">IMU MPU-6050</text>
<text x="90" y="233" text-anchor="middle" font-size="10" fill="#666">I2C 400 kHz, 3.3V</text>

<rect x="20" y="260" width="140" height="50" rx="8" fill="#F1EFE8" stroke="#888" stroke-width="0.8"/>
<text x="90" y="280" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Wheel Encoders</text>
<text x="90" y="298" text-anchor="middle" font-size="10" fill="#666">Quadrature, 5V TTL</text>

<!-- MCU -->
<rect x="200" y="50" width="180" height="290" rx="12" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1.2"/>
<text x="290" y="72" text-anchor="middle" font-size="13" font-weight="bold" fill="#3C3489">Microcontroller</text>
<text x="290" y="88" text-anchor="middle" font-size="10" fill="#534AB7">STM32 / Arduino</text>

<rect x="214" y="100" width="152" height="34" rx="6" fill="#fff" stroke="#AFA9EC" stroke-width="0.7"/>
<text x="290" y="121" text-anchor="middle" font-size="10" fill="#444">GPIO pulse timer (echo)</text>
<rect x="214" y="144" width="152" height="34" rx="6" fill="#fff" stroke="#AFA9EC" stroke-width="0.7"/>
<text x="290" y="165" text-anchor="middle" font-size="10" fill="#444">I2C master driver</text>
<rect x="214" y="188" width="152" height="34" rx="6" fill="#fff" stroke="#AFA9EC" stroke-width="0.7"/>
<text x="290" y="209" text-anchor="middle" font-size="10" fill="#444">Encoder counter</text>
<rect x="214" y="232" width="152" height="34" rx="6" fill="#fff" stroke="#AFA9EC" stroke-width="0.7"/>
<text x="290" y="253" text-anchor="middle" font-size="10" fill="#444">PWM motor output</text>
<rect x="214" y="276" width="152" height="30" rx="6" fill="#fff" stroke="#AFA9EC" stroke-width="0.7"/>
<text x="290" y="295" text-anchor="middle" font-size="10" fill="#444">UART TX / RX</text>

<!-- Sensor to MCU arrows -->
<line x1="160" y1="90" x2="200" y2="117" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<text x="175" y="98" text-anchor="middle" font-size="9" fill="#888">3.3V GPIO</text>
<line x1="160" y1="155" x2="200" y2="161" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<text x="175" y="151" text-anchor="middle" font-size="9" fill="#888">3.3V GPIO</text>
<line x1="160" y1="220" x2="200" y2="205" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<text x="175" y="210" text-anchor="middle" font-size="9" fill="#888">I2C</text>
<line x1="160" y1="285" x2="200" y2="249" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<text x="175" y="271" text-anchor="middle" font-size="9" fill="#888">5V TTL</text>

<!-- RASPBERRY PI -->
<rect x="430" y="50" width="210" height="290" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.2"/>
<text x="535" y="72" text-anchor="middle" font-size="13" font-weight="bold" fill="#085041">Raspberry Pi 4</text>
<text x="535" y="88" text-anchor="middle" font-size="10" fill="#0F6E56">ROS2 Jazzy host</text>

<rect x="444" y="100" width="182" height="34" rx="6" fill="#fff" stroke="#5DCAA5" stroke-width="0.7"/>
<text x="535" y="121" text-anchor="middle" font-size="10" fill="#444">Serial node → /scan topics</text>
<rect x="444" y="144" width="182" height="34" rx="6" fill="#fff" stroke="#5DCAA5" stroke-width="0.7"/>
<text x="535" y="165" text-anchor="middle" font-size="10" fill="#444">robot_navigator node</text>
<rect x="444" y="188" width="182" height="34" rx="6" fill="#fff" stroke="#5DCAA5" stroke-width="0.7"/>
<text x="535" y="209" text-anchor="middle" font-size="10" fill="#444">diff_drive_controller</text>
<rect x="444" y="232" width="182" height="34" rx="6" fill="#fff" stroke="#5DCAA5" stroke-width="0.7"/>
<text x="535" y="253" text-anchor="middle" font-size="10" fill="#444">/odom publisher</text>
<rect x="444" y="276" width="182" height="30" rx="6" fill="#fff" stroke="#5DCAA5" stroke-width="0.7"/>
<text x="535" y="295" text-anchor="middle" font-size="10" fill="#444">cmd_vel subscriber</text>

<!-- MCU <-> RPi UART -->
<line x1="380" y1="288" x2="430" y2="288" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arrow2)"/>
<line x1="430" y1="300" x2="380" y2="300" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arrow2)"/>
<text x="405" y="282" text-anchor="middle" font-size="10" font-weight="bold" fill="#534AB7">UART</text>
<text x="405" y="316" text-anchor="middle" font-size="9" fill="#534AB7">115200 baud, 8-N-1</text>
<text x="405" y="328" text-anchor="middle" font-size="9" fill="#534AB7">3.3V TTL</text>

<!-- ACTUATORS -->
<text x="680" y="56" text-anchor="middle" font-size="12" fill="#555">Actuators</text>

<rect x="660" y="65" width="220" height="50" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.8"/>
<text x="770" y="85" text-anchor="middle" font-size="12" font-weight="bold" fill="#4A1B0C">Motor Driver L298N</text>
<text x="770" y="103" text-anchor="middle" font-size="10" fill="#712B13">PWM + DIR, 12V H-bridge</text>

<rect x="660" y="130" width="220" height="50" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.8"/>
<text x="770" y="150" text-anchor="middle" font-size="12" font-weight="bold" fill="#4A1B0C">DC Motors x2</text>
<text x="770" y="168" text-anchor="middle" font-size="10" fill="#712B13">Left + Right wheels, 12V</text>

<rect x="660" y="195" width="220" height="50" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.8"/>
<text x="770" y="215" text-anchor="middle" font-size="12" font-weight="bold" fill="#173404">Gear Servo Controller</text>
<text x="770" y="233" text-anchor="middle" font-size="10" fill="#27500A">JointTrajectory ROS2 topic</text>

<!-- RPi → Actuator arrows -->
<line x1="640" y1="291" x2="660" y2="90" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<text x="655" y="200" text-anchor="middle" font-size="9" fill="#888">PWM</text>
<line x1="770" y1="115" x2="770" y2="130" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="648" y1="291" x2="770" y2="195" stroke="#2a8" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#arrow)"/>

<!-- POWER -->
<rect x="200" y="370" width="180" height="50" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
<text x="290" y="390" text-anchor="middle" font-size="12" font-weight="bold" fill="#412402">LiPo 3S 11.1V</text>
<text x="290" y="408" text-anchor="middle" font-size="10" fill="#633806">5V reg → RPi + MCU</text>

<line x1="290" y1="340" x2="290" y2="370" stroke="#EF9F27" stroke-width="1.2" marker-end="url(#arrow)"/>
<line x1="380" y1="395" x2="430" y2="395" stroke="#EF9F27" stroke-width="1.2" marker-end="url(#arrow)"/>
<line x1="380" y1="395" x2="660" y2="395" stroke="#EF9F27" stroke-width="0.8" stroke-dasharray="4 2"/>

<!-- LEGEND -->
<rect x="20" y="450" width="860" height="290" rx="10" fill="none" stroke="#ccc" stroke-width="1" stroke-dasharray="5 3"/>
<text x="450" y="474" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">Communication Protocols and Signal Properties</text>

<rect x="40" y="490" width="12" height="12" rx="2" fill="#888780"/>
<text x="60" y="502" font-size="11" fill="#333">GPIO — Ultrasonic (HC-SR04): 3.3V digital, Trig = 10μs pulse, Echo width = distance × 58μs/cm, max range 4m, 10Hz update</text>

<rect x="40" y="516" width="12" height="12" rx="2" fill="#1D9E75"/>
<text x="60" y="528" font-size="11" fill="#333">I2C — IMU (MPU-6050): 400 kHz fast-mode, SDA + SCL lines, 3.3V, 7-bit address 0x68, outputs accelerometer + gyro at 100Hz</text>

<rect x="40" y="542" width="12" height="12" rx="2" fill="#5DCAA5"/>
<text x="60" y="554" font-size="11" fill="#333">GPIO — Wheel Encoders: 5V TTL quadrature, phase A + B channels, MCU counts rising edges for velocity and odometry</text>

<rect x="40" y="568" width="12" height="12" rx="2" fill="#7F77DD"/>
<text x="60" y="580" font-size="11" fill="#333">UART — MCU ↔ RPi: 115200 baud, 8 data bits, No parity, 1 stop bit (8-N-1), 3.3V TTL, bidirectional: sensor data up, cmd_vel down</text>

<rect x="40" y="594" width="12" height="12" rx="2" fill="#378ADD"/>
<text x="60" y="606" font-size="11" fill="#333">ROS2 / CycloneDDS — Internal RPi: Publish-subscribe middleware over localhost, 10Hz control loop, QoS: reliable, sensor: best-effort</text>

<rect x="40" y="620" width="12" height="12" rx="2" fill="#D85A30"/>
<text x="60" y="632" font-size="11" fill="#333">PWM — DC Motors: 12V H-bridge, duty cycle 0–100%, ~20kHz carrier frequency, DIR pin selects rotation direction</text>

<rect x="40" y="646" width="12" height="12" rx="2" fill="#639922"/>
<text x="60" y="658" font-size="11" fill="#333">JointTrajectory — Gear controller: ROS2 topic over CycloneDDS, position commands in radians, 1Hz update rate at waypoints</text>

<rect x="40" y="672" width="12" height="12" rx="2" fill="#EF9F27"/>
<text x="60" y="684" font-size="11" fill="#333">Power — LiPo 3S 11.1V: feeds motor driver directly (12V), 5V buck regulator supplies RPi (5V/3A) and MCU (5V/500mA)</text>

<text x="450" y="725" text-anchor="middle" font-size="10" fill="#999">Note: In simulation (Gazebo), the MCU layer is replaced by the ROS2 diff_drive_controller plugin running on the same RPi/PC.</text>
</svg>
